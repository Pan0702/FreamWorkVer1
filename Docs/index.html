<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Framework 説明書 — クラスリファレンス</title>
<style>
  :root {
    --bg:#f5f6f8; --panel:#fff; --sidebar:#f0f2f5; --ink:#1b2733; --ink-soft:#4a5b6d;
    --ink-faint:#7c8da0; --line:#dfe4ea; --line-soft:#e9edf1; --accent:#1f74d0;
    --accent-soft:#e8f1fc; --code-bg:#f2f4f7; --sel:#e2eefb; --hover:#e9edf2;
    --mono:ui-monospace,"SF Mono","Cascadia Code","Consolas","Roboto Mono",monospace;
    --sans:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#10151b; --panel:#161c24; --sidebar:#131920; --ink:#e6ecf2; --ink-soft:#aeb9c6;
    --ink-faint:#6f7d8c; --line:#26313c; --line-soft:#1e2833; --accent:#5aa9f0;
    --accent-soft:#14263a; --code-bg:#0d1218; --sel:#16304a; --hover:#1c2530;}}
  :root[data-theme="light"]{--bg:#f5f6f8;--panel:#fff;--sidebar:#f0f2f5;--ink:#1b2733;--ink-soft:#4a5b6d;--ink-faint:#7c8da0;--line:#dfe4ea;--line-soft:#e9edf1;--accent:#1f74d0;--accent-soft:#e8f1fc;--code-bg:#f2f4f7;--sel:#e2eefb;--hover:#e9edf2;}
  :root[data-theme="dark"]{--bg:#10151b;--panel:#161c24;--sidebar:#131920;--ink:#e6ecf2;--ink-soft:#aeb9c6;--ink-faint:#6f7d8c;--line:#26313c;--line-soft:#1e2833;--accent:#5aa9f0;--accent-soft:#14263a;--code-bg:#0d1218;--sel:#16304a;--hover:#1c2530;}

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-rows:auto 1fr;height:100vh;}

  header{display:flex;align-items:center;gap:16px;padding:0 18px;height:52px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;}
  .brand{display:flex;align-items:baseline;gap:10px;font-weight:700;letter-spacing:.2px;}
  .brand .mark{font-family:var(--mono);color:var(--accent);}
  .brand .sub{font-size:12px;font-weight:500;color:var(--ink-faint);letter-spacing:.5px;text-transform:uppercase;}
  .count{font-size:12px;color:var(--ink-faint);font-family:var(--mono);}
  .search{margin-left:auto;position:relative;}
  .search input{width:260px;max-width:42vw;padding:7px 12px 7px 32px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13px;font-family:var(--sans);}
  .search input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
  .search::before{content:"⌕";position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:15px;}
  .theme-btn{border:1px solid var(--line);background:var(--bg);color:var(--ink-soft);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:15px;}
  .theme-btn:hover{background:var(--hover);}

  .body{display:grid;grid-template-columns:330px 1fr;min-height:0;}
  @media (max-width:760px){.body{grid-template-columns:1fr;} aside{display:none;}}
  aside{background:var(--sidebar);border-right:1px solid var(--line);overflow-y:auto;padding:10px 0 60px;}
  .tree{font-size:13.5px;}
  .node-row{display:flex;align-items:center;gap:6px;padding:3px 12px 3px 0;cursor:pointer;white-space:nowrap;user-select:none;}
  .node-row:hover{background:var(--hover);}
  .node-row.active{background:var(--sel);}
  .node-row.active .node-label{color:var(--accent);font-weight:600;}
  .twist{width:14px;text-align:center;color:var(--ink-faint);font-size:10px;flex-shrink:0;transition:transform .12s;}
  .twist.open{transform:rotate(90deg);}
  .twist.leaf{visibility:hidden;}
  .icon{width:15px;flex-shrink:0;display:inline-block;text-align:center;font-size:12px;color:var(--ink-faint);}
  .node-label{overflow:hidden;text-overflow:ellipsis;}
  .node-label .ext{color:var(--ink-faint);}
  .dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;margin-left:2px;}

  main{overflow-y:auto;}
  .doc{max-width:880px;margin:0 auto;padding:34px 40px 120px;}
  @media (max-width:760px){.doc{padding:24px 18px 100px;}}
  .crumb{font-family:var(--mono);font-size:12.5px;color:var(--ink-faint);margin-bottom:18px;display:flex;flex-wrap:wrap;gap:4px;}
  .doc h1{font-size:27px;margin:0 0 6px;letter-spacing:-.3px;text-wrap:balance;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .layer-badge{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:20px;color:#fff;}
  .kicker{color:var(--ink-faint);font-size:13.5px;font-family:var(--mono);margin:0 0 20px;}
  .lead{font-size:16.5px;color:var(--ink-soft);border-left:3px solid var(--accent);padding:2px 0 2px 16px;margin:0 0 30px;}
  .doc h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-faint);margin:38px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line-soft);font-weight:700;}
  .doc p{margin:0 0 14px;}
  .doc code{font-family:var(--mono);font-size:.88em;background:var(--code-bg);padding:1.5px 6px;border-radius:5px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-family:var(--mono);font-size:12.5px;background:var(--code-bg);border:1px solid var(--line);padding:4px 10px;border-radius:7px;color:var(--ink-soft);}
  .chip b{color:var(--ink);}
  .chip .arrow{color:var(--ink-faint);}
  table.members{width:100%;border-collapse:collapse;font-size:14px;}
  table.members th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:700;padding:0 12px 8px;border-bottom:1px solid var(--line);}
  table.members td{padding:11px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top;}
  table.members td.sig{font-family:var(--mono);font-size:12.6px;color:var(--ink);}
  table.members td.desc{color:var(--ink-soft);}
  table.members td.desc .extra{margin-top:6px;display:flex;flex-direction:column;gap:2px;font-size:12.5px;color:var(--ink-faint);}
  table.members td.desc .extra i{font-style:normal;color:var(--accent);font-family:var(--mono);margin-right:5px;}
  .note{background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:10px;padding:14px 16px;margin:8px 0 0;font-size:14px;color:var(--ink-soft);}
  .empty{color:var(--ink-faint);font-size:14px;font-style:italic;}
  .folder-view .big{font-size:15px;color:var(--ink-faint);}
  .layer-files{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:8px;}
  .layer-files a{display:flex;align-items:center;gap:8px;text-decoration:none;font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);padding:8px 11px;border-radius:8px;}
  .layer-files a:hover{border-color:var(--accent);color:var(--accent);}
  a{color:var(--accent);}
  ::selection{background:var(--sel);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="mark">&lt;/&gt;</span>

    <div class="search"><input id="q" type="text" placeholder="ファイル・クラスを検索…" autocomplete="off"></div>

  </header>
  <div class="body">

    <main><div class="doc" id="doc"></div></main>
  </div>
</div>

const LAYERS = DATA.layers, DOCS = DATA.docs, TREE = DATA.tree;
const treeEl = document.getElementById('tree');
const docEl  = document.getElementById('doc');
document.getElementById('count').textContent = DATA.count + ' files';

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function layerColor(l){ return (LAYERS[l]&&LAYERS[l].color)||'var(--ink-faint)'; }
function layerName(l){ return (LAYERS[l]&&LAYERS[l].name)||''; }

function renderTree(nodes, container, depth, prefix){
  nodes.forEach(node=>{
    const nodePath = prefix ? (prefix+'/'+node.f) : node.f;
    const row = document.createElement('div');
    row.className='node-row';
    row.style.paddingLeft=(10+depth*15)+'px';
    const isFolder=!!node.folder;
    const tw=document.createElement('span');
    tw.className='twist'+(isFolder?'':' leaf'); tw.textContent='▶'; row.appendChild(tw);
    if(isFolder){ const ic=document.createElement('span'); ic.className='icon'; ic.textContent='▤'; row.appendChild(ic); }
    else { const dot=document.createElement('span'); dot.className='dot'; dot.style.background=layerColor(node.layer); row.appendChild(dot); }
    const lab=document.createElement('span'); lab.className='node-label';
    const nm=node.f, di=nm.lastIndexOf('.');
    if(!isFolder && di>0){ lab.innerHTML=esc(nm.slice(0,di))+'<span class="ext">'+esc(nm.slice(di))+'</span>'; }
    else lab.textContent=nm;
    row.appendChild(lab);
    container.appendChild(row);
    if(isFolder){
      const kids=document.createElement('div'); kids.className='children'; kids.style.display='none';
      renderTree(node.children,kids,depth+1,nodePath); container.appendChild(kids);
      row.addEventListener('click',()=>{ const open=kids.style.display!=='none'; kids.style.display=open?'none':'block'; tw.classList.toggle('open',!open); renderFolder(node,nodePath); document.querySelector('main').scrollTop=0; });
      if(depth<1){ kids.style.display='block'; tw.classList.add('open'); }
      row.dataset.folder='1';
    } else {
      row.dataset.p=node.p; row.dataset.file=node.f; row.dataset.layer=node.layer||'';
      row.addEventListener('click',()=>select(node.p));
    }
  });
}

function openAncestors(row){
  let n=row.parentElement;
  while(n&&n.classList){
    if(n.classList.contains('children')){ n.style.display='block'; const p=n.previousElementSibling; if(p){const t=p.querySelector('.twist'); if(t)t.classList.add('open');} }
    n=n.parentElement;
  }
}

function crumbHtml(path){
  const parts=path.split('/');
  return parts.map((x,i)=> i===parts.length-1?('<b style="color:var(--ink-soft)">'+esc(x)+'</b>'):esc(x)).join(' <span style="opacity:.5">/</span> ');
}

function select(pid){
  document.querySelectorAll('.node-row.active').forEach(e=>e.classList.remove('active'));
  const row=document.querySelector('.node-row[data-p="'+CSS.escape(pid)+'"]');
  if(row){ row.classList.add('active'); openAncestors(row); }
  history.replaceState(null,'','#'+encodeURIComponent(pid));
  renderDoc(pid);
  document.querySelector('main').scrollTop=0;
}

function renderDoc(pid){
  const d=DOCS[pid];
  if(!d){ docEl.innerHTML='<div class="crumb">'+crumbHtml(pid)+'</div><p class="empty">解説データがありません。</p>'; return; }
  const color=layerColor(d.layer);
  let h='<div class="crumb">'+crumbHtml(d.kicker||pid)+'</div>';
  h+='<h1>'+esc(d.title)+'<span class="layer-badge" style="background:'+color+'">'+esc(layerName(d.layer))+'</span></h1>';
  h+='<p class="kicker">'+esc(d.kicker||pid)+'</p>';
  if(d.lead) h+='<p class="lead">'+d.lead+'</p>';

  if(d.classes&&d.classes.length){
    h+='<h2>定義されている型</h2><div class="chips">';
    h+=d.classes.map(c=> '<span class="chip"><b>'+esc(c.name)+'</b>'+(c.base?(' <span class="arrow">: </span>'+esc(c.base)):'')+'</span>').join('');
    h+='</div>';
  }
  if(d.enums&&d.enums.length){
    h+='<div class="chips" style="margin-top:8px">'+d.enums.map(e=>'<span class="chip">enum '+esc(e)+'</span>').join('')+'</div>';
  }

  if(d.funcs&&d.funcs.length){
    h+='<h2>関数・メソッド ('+d.funcs.length+')</h2><table class="members"><thead><tr><th style="width:46%">シグネチャ</th><th>説明</th></tr></thead><tbody>';
    h+=d.funcs.map(f=>{
      let ex=''; if(f.extra&&f.extra.length){ ex='<div class="extra">'+f.extra.map(x=>'<span>'+x+'</span>').join('')+'</div>'; }
      return '<tr><td class="sig">'+esc(f.sig)+'</td><td class="desc">'+(esc(f.desc)||'<span class="empty">—</span>')+ex+'</td></tr>';
    }).join('');
    h+='</tbody></table>';
  }
  if(d.vars&&d.vars.length){
    h+='<h2>メンバ変数 ('+d.vars.length+')</h2><table class="members"><thead><tr><th style="width:32%">名前</th><th>説明</th></tr></thead><tbody>';
    h+=d.vars.map(v=> '<tr><td class="sig">'+esc(v.name)+'</td><td class="desc">'+(esc(v.desc)||'<span class="empty">'+esc(v.type||'')+'</span>')+'</td></tr>').join('');
    h+='</tbody></table>';
  }
  if((!d.funcs||!d.funcs.length)&&(!d.vars||!d.vars.length)&&(!d.classes||!d.classes.length)){
    h+='<p class="empty" style="margin-top:24px">このファイルからは公開シンボルを抽出していません（実装のみ、または宣言なし）。</p>';
  }
  docEl.innerHTML=h;
}

function renderFolder(node, path){
  // フォルダ概要 + 直下ファイル一覧
  const files=[]; (function walk(n){ (n.children||[]).forEach(c=>{ if(c.folder) walk(c); else files.push(c); }); })(node);
  let h='<div class="crumb">'+crumbHtml(path)+'</div>';
  h+='<h1>'+esc(node.f)+(node.layer?('<span class="layer-badge" style="background:'+layerColor(node.layer)+'">'+esc(layerName(node.layer))+'</span>'):'')+'</h1>';
  if(node.overview) h+='<p class="lead">'+esc(node.overview)+'</p>';
  h+='<h2>含まれるファイル ('+files.length+')</h2><div class="layer-files">';
  h+=files.map(f=>'<a href="#'+encodeURIComponent(f.p)+'" data-jump="'+esc(f.p)+'"><span class="dot" style="background:'+layerColor(f.layer)+'"></span>'+esc(f.f)+'</a>').join('');
  h+='</div>';
  docEl.innerHTML=h;
  docEl.querySelectorAll('a[data-jump]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();select(a.dataset.jump);}));
}

const q=document.getElementById('q');
q.addEventListener('input',()=>{
  const t=q.value.trim().toLowerCase();
  document.querySelectorAll('.node-row').forEach(r=>{
    if(r.dataset.p!==undefined){
      const hit=!t || (r.dataset.file||'').toLowerCase().includes(t) || ((DOCS[r.dataset.p]&&(DOCS[r.dataset.p].classes||[]).map(c=>c.name).join(' '))||'').toLowerCase().includes(t);
      r.style.display=hit?'':'none';
    }
  });
});

document.getElementById('themeBtn').addEventListener('click',()=>{
  const root=document.documentElement, cur=root.getAttribute('data-theme');
  const dark=cur?cur==='dark':matchMedia('(prefers-color-scheme: dark)').matches;
  root.setAttribute('data-theme',dark?'light':'dark');
});

renderTree(TREE,treeEl,0,'');
const initial=decodeURIComponent(location.hash.slice(1));
if(initial&&DOCS[initial]) select(initial);
else { const first=document.querySelector('.node-row[data-p]'); if(first) select(first.dataset.p); }
</script>
